spring.application.name=sms-backend

# Server
server.port=8081

# MongoDB Configuration
# Use environment variable MONGODB_URI for production (e.g., MongoDB Atlas)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/sms_db}
spring.data.mongodb.database=sms_db

# Logging
logging.level.com.sms=INFO
logging.level.org.springframework.data.mongodb=DEBUG

# Jackson
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.default-property-inclusion=non_null
